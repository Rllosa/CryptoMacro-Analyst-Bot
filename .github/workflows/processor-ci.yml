name: Processor CI

on:
  pull_request:
    branches: [main]
    paths:
      - "processor/**"
      - "schema/contracts/**"
      - "configs/**"
  push:
    branches: [main]
    paths:
      - "processor/**"
      - "schema/contracts/**"
      - "configs/**"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "processor/pyproject.toml"

      - name: Install dependencies
        run: pip install -e "processor/[dev]"

      - name: Lint (ruff)
        run: ruff check processor/src/

      - name: Test (pytest)
        run: pytest processor/tests/ -q --tb=short
