name: Bot CI

on:
  pull_request:
    branches: [main]
    paths:
      - "bot/**"
      - "schema/contracts/**"
  push:
    branches: [main]
    paths:
      - "bot/**"
      - "schema/contracts/**"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "bot/pyproject.toml"

      - name: Install dependencies
        run: pip install -e "bot/[dev]"

      - name: Lint (ruff)
        run: ruff check bot/src/

      - name: Test (pytest)
        run: pytest bot/tests/ -q --tb=short
